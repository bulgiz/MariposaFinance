# Mariposa Finance - Nginx Reverse Proxy Configuration
# Place in: /etc/nginx/sites-available/mariposa.finance
# Enable with: sudo ln -s /etc/nginx/sites-available/mariposa.finance /etc/nginx/sites-enabled/

# WebSocket upgrade map — handles both WS and regular HTTP on the same location.
# Add this to /etc/nginx/nginx.conf inside http {} if not already present.
# (server-setup.sh does this automatically via sed)
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Rate limiting zone for API: 30 req/sec per IP
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;

# HTTP server - redirect to HTTPS
server {
  listen 80;
  listen [::]:80;
  server_name mariposa.finance www.mariposa.finance;

  # Certbot renewal
  location /.well-known/acme-challenge/ {
    root /var/www/certbot;
  }

  # Redirect all HTTP to HTTPS
  location / {
    return 301 https://$server_name$request_uri;
  }
}

# HTTPS server
server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name mariposa.finance www.mariposa.finance;

  # SSL certificates (Certbot fills these in automatically)
  # ssl_certificate /etc/letsencrypt/live/mariposa.finance/fullchain.pem;
  # ssl_certificate_key /etc/letsencrypt/live/mariposa.finance/privkey.pem;

  # SSL configuration
  ssl_protocols TLSv1.2 TLSv1.3;
  ssl_ciphers HIGH:!aNULL:!MD5;
  ssl_prefer_server_ciphers on;
  ssl_session_cache shared:SSL:10m;
  ssl_session_timeout 10m;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss;
  gzip_min_length 1000;
  gzip_vary on;
  gzip_proxied any;

  # Logging
  access_log /var/log/nginx/mariposa.access.log;
  error_log /var/log/nginx/mariposa.error.log warn;

  # Health check endpoint (no logging)
  location /health {
    access_log off;
    proxy_pass http://127.0.0.1:3001/health;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
  }

  # API endpoints with rate limiting
  location /api/ {
    limit_req zone=api_limit burst=50 nodelay;

    proxy_pass http://127.0.0.1:3001/;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout 60s;
    proxy_read_timeout 60s;
  }

  # Static Next.js assets (immutable cache)
  location /_next/static/ {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    proxy_set_header Host $host;
    proxy_cache_valid 200 1y;
    proxy_cache_bypass $http_pragma $http_authorization;
    add_header Cache-Control "public, immutable, max-age=31536000" always;
  }

  # Main application (Next.js)
  location / {
    proxy_pass http://127.0.0.1:3000;
    proxy_http_version 1.1;
    proxy_set_header Host              $host;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;

    # WebSocket support — uses map above so regular HTTP gets Connection: close,
    # WebSocket upgrades get Connection: upgrade. Both work correctly.
    proxy_set_header Upgrade    $http_upgrade;
    proxy_set_header Connection $connection_upgrade;

    # Timeouts
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;
  }

  # Deny access to hidden files
  location ~ /\. {
    deny all;
    access_log off;
    log_not_found off;
  }
}
